server:
  listen: "0.0.0.0:9445"

tls:
  ca_bundle: "/run/bridge-certs/ca-bundle.crt"
  cert: "/run/bridge-certs/bridge.local.crt"
  key: "/run/bridge-certs/bridge.local.key"

auth:
  jwt_public_keys:
    - issuer: "dev"
      key_path: "/run/bridge-certs/jwt-signing.pub"
  jwt_audience: "bridge"
  jwt_max_ttl: "5m"

sessions:
  max_per_project: 5
  max_global: 20
  idle_timeout: "30m"
  stop_grace_period: "10s"
  event_buffer_size: 8388608

input:
  max_size_bytes: 65536

rate_limits:
  global_rps: 50
  global_burst: 100
  start_session_per_client_rps: 1
  start_session_per_client_burst: 3
  send_input_per_session_rps: 5
  send_input_per_session_burst: 20

providers:
  claude:
    binary: "./node_modules/.bin/claude"
    args: ["--verbose"]
    startup_timeout: "60s"
    startup_probe: "prompt"
    required_env: ["ANTHROPIC_API_KEY"]
    prompt_pattern: "(?m)(❯|>\\s*$)"
  opencode:
    binary: "./node_modules/.bin/opencode"
    args: []
    startup_timeout: "45s"
    startup_probe: "output"
    required_env: ["OPENAI_API_KEY"]
    prompt_pattern: "❯"
  gemini:
    binary: "./node_modules/.bin/gemini"
    args: []
    startup_timeout: "60s"
    startup_probe: "output"
    required_env: ["GEMINI_API_KEY"]
    prompt_pattern: "^\\s*>\\s*$"

allowed_paths:
  - "/repos"

logging:
  level: "info"
  format: "json"
  redact_patterns:
    - "(?i)(api[_-]?key|token|secret|password)\\s*[:=]\\s*\\S+"
