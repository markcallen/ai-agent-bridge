name: Provider Version Check

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * 1"

jobs:
  versions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Capture provider versions
        run: ./scripts/check-provider-versions.sh | tee provider-versions.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload version report
        uses: actions/upload-artifact@v4
        with:
          name: provider-versions
          path: provider-versions.md
