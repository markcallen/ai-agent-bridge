name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  go-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "29.3"

      - name: Install Go tooling
        run: |
          go install golang.org/x/tools/cmd/goimports@latest
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8

      - name: Run lint
        run: make lint

  go-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: make test

      - name: Enforce maintained package coverage
        run: make test-cover-maintained

  typescript-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            package-lock.json
            packages/bridge-client-node/package-lock.json
            examples/chat-ts/package-lock.json

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install root dependencies
        run: npm ci

      - name: Install SDK dependencies
        run: npm --prefix packages/bridge-client-node install

      - name: Install chat-ts dependencies
        run: npm --prefix examples/chat-ts install

      - name: Install chat-web dependencies
        run: pnpm --dir examples/chat-web install --frozen-lockfile

      - name: Build TypeScript packages
        run: |
          npm --prefix packages/bridge-client-node run build
          npm --prefix examples/chat-ts run build
          pnpm --dir examples/chat-web run build
