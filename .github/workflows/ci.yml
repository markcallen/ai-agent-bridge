name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  go-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "29.3"

      - name: Install Go tooling
        run: |
          go install golang.org/x/tools/cmd/goimports@latest
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8

      - name: Run lint
        run: make lint

  go-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests with coverage
        run: ./scripts/test-go-coverage.sh

      - name: Enforce maintained package coverage
        run: make test-cover-maintained

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: markcallen/ai-agent-bridge
          files: ./coverage.out
          flags: go
          name: go-coverage

  typescript-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            package-lock.json
            packages/bridge-client-node/package-lock.json
            examples/chat-ts/package-lock.json

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Install root dependencies
        run: npm ci

      - name: Install SDK dependencies
        run: npm --prefix packages/bridge-client-node ci

      - name: Install chat-ts dependencies
        run: npm --prefix examples/chat-ts ci

      - name: Install chat-web dependencies
        run: pnpm --dir examples/chat-web install --frozen-lockfile

      - name: Lint TypeScript packages and examples
        run: npm run lint:ts

  typescript-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            package-lock.json
            packages/bridge-client-node/package-lock.json
            examples/chat-ts/package-lock.json

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Install root dependencies
        run: npm ci

      - name: Install SDK dependencies
        run: npm --prefix packages/bridge-client-node ci

      - name: Install chat-ts dependencies
        run: npm --prefix examples/chat-ts ci

      - name: Install chat-web dependencies
        run: pnpm --dir examples/chat-web install --frozen-lockfile

      - name: Build TypeScript packages and examples
        run: npm run build:ts

      - name: Run TypeScript tests
        run: npm run test:ts

      - name: Generate TypeScript coverage reports
        run: npm run test:ts:coverage

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: markcallen/ai-agent-bridge
          files: |
            ./packages/bridge-client-node/coverage/lcov.info
            ./examples/chat-ts/coverage/lcov.info
            ./examples/chat-web/coverage/lcov.info
          flags: typescript
          name: typescript-coverage

  smoke:
    if: github.event_name == 'pull_request'
    needs:
      - go-lint
      - go-test
      - typescript-lint
      - typescript-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Run smoke test
        run: ./scripts/smoke.sh
