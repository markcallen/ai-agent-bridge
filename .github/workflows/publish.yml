name: Publish

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Semantic version increment to release
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  bump_and_tag:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.select.outputs.version }}
      tag: ${{ steps.select.outputs.tag }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Fetch previous tag
        id: previous
        uses: WyriHaximus/github-action-get-previous-tag@v2
        with:
          fallback: v0.0.0
          pattern: v*[0-9].*[0-9].*[0-9]

      - name: Compute next semantic versions
        id: semvers
        uses: WyriHaximus/github-action-next-semvers@v1
        with:
          version: ${{ steps.previous.outputs.tag }}

      - name: Select release version
        id: select
        env:
          RELEASE_TYPE: ${{ github.event.inputs.release_type }}
          PATCH_VERSION: ${{ steps.semvers.outputs.patch }}
          MINOR_VERSION: ${{ steps.semvers.outputs.minor }}
          MAJOR_VERSION: ${{ steps.semvers.outputs.major }}
        run: |
          case "$RELEASE_TYPE" in
            patch) version="$PATCH_VERSION" ;;
            minor) version="$MINOR_VERSION" ;;
            major) version="$MAJOR_VERSION" ;;
            *)
              echo "unsupported release_type: $RELEASE_TYPE" >&2
              exit 1
              ;;
          esac

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Create and push release tag
        env:
          RELEASE_TAG: ${{ steps.select.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git rev-parse "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Tag $RELEASE_TAG already exists locally; continuing with the existing tag."
            exit 0
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Tag $RELEASE_TAG already exists on origin; continuing with the existing tag."
            exit 0
          fi

          git tag "$RELEASE_TAG"
          git push origin "refs/tags/$RELEASE_TAG"

  verify_release:
    name: Verify release inputs
    runs-on: ubuntu-latest
    needs:
      - bump_and_tag
    if: >-
      always() && (
        (github.event_name == 'workflow_dispatch' && needs.bump_and_tag.result == 'success') ||
        (github.event_name == 'push' && github.actor != 'github-actions[bot]')
      )
    permissions:
      contents: read
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && needs.bump_and_tag.outputs.tag || github.ref_name }}
      RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', needs.bump_and_tag.outputs.tag) || github.ref }}
    steps:
      - name: Check out release tag
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_REF }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Verify tests pass from release tag
        run: go test ./...

      - name: Verify Go packages build from release tag
        run: go build ./...

      - name: Summarize release target
        run: |
          echo "Publishing from $RELEASE_TAG"

  publish_container:
    name: Publish GHCR image
    runs-on: ubuntu-latest
    needs:
      - bump_and_tag
      - verify_release
    if: always() && needs.verify_release.result == 'success'
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.build.outputs.digest }}
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && needs.bump_and_tag.outputs.tag || github.ref_name }}
      RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', needs.bump_and_tag.outputs.tag) || github.ref }}
    steps:
      - name: Check out release tag
        uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_REF }}

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ env.RELEASE_TAG }}
            type=sha,prefix=sha-,format=short

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            BUILD_FROM=source
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summarize published image
        run: |
          echo "Image tags:"
          echo "${{ steps.meta.outputs.tags }}"
          echo "Digest: ${{ steps.build.outputs.digest }}"

  build_apt_packages:
    name: Build apt packages
    runs-on: ubuntu-latest
    needs:
      - bump_and_tag
      - verify_release
    if: always() && needs.verify_release.result == 'success'
    permissions:
      contents: read
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && needs.bump_and_tag.outputs.tag || github.ref_name }}
      RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', needs.bump_and_tag.outputs.tag) || github.ref }}
    steps:
      - name: Check out release tag
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_REF }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install packaging tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y apt-utils dpkg-dev gnupg

      - name: Run local apt smoke test
        run: ./scripts/smoke-apt-local.sh

      - name: Build release .deb packages
        env:
          RELEASE_VERSION: ${{ env.RELEASE_TAG }}
        run: |
          for arch in amd64 arm64; do
            ARCH="$arch" VERSION="${RELEASE_VERSION#v}" OUTPUT_DIR="$PWD/dist/deb" ./scripts/build-deb.sh
          done

      - name: Upload .deb artifacts
        uses: actions/upload-artifact@v7
        with:
          name: deb-packages
          path: dist/deb/*.deb

  smoke_container:
    name: Smoke test published container
    runs-on: ubuntu-latest
    needs:
      - bump_and_tag
      - verify_release
      - publish_container
    if: always() && needs.verify_release.result == 'success' && needs.publish_container.result == 'success'
    permissions:
      contents: read
      packages: read
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && needs.bump_and_tag.outputs.tag || github.ref_name }}
    steps:
      - name: Check out release tag
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', needs.bump_and_tag.outputs.tag) || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Smoke test published image
        run: |
          ./scripts/smoke-container.sh "ghcr.io/${{ github.repository }}@${{ needs.publish_container.outputs.digest }}"

  smoke_deb_artifacts:
    name: Smoke test .deb artifacts
    runs-on: ubuntu-latest
    needs:
      - bump_and_tag
      - verify_release
      - build_apt_packages
    if: always() && needs.verify_release.result == 'success' && needs.build_apt_packages.result == 'success'
    permissions:
      contents: read
    steps:
      - name: Check out release tag
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', needs.bump_and_tag.outputs.tag) || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Download .deb artifacts
        uses: actions/download-artifact@v8
        with:
          name: deb-packages
          path: dist/deb

      - name: Smoke test amd64 deb on noble
        run: |
          deb="$(ls dist/deb/*_amd64.deb | head -1)"
          ./scripts/smoke-deb-docker.sh "$deb" noble

      - name: Smoke test amd64 deb on plucky
        run: |
          deb="$(ls dist/deb/*_amd64.deb | head -1)"
          ./scripts/smoke-deb-docker.sh "$deb" plucky

  publish_apt_repository:
    name: Publish apt repository
    runs-on: ubuntu-latest
    needs:
      - bump_and_tag
      - verify_release
      - build_apt_packages
      - smoke_deb_artifacts
    if: always() && needs.verify_release.result == 'success' && needs.build_apt_packages.result == 'success' && needs.smoke_deb_artifacts.result == 'success'
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && needs.bump_and_tag.outputs.tag || github.ref_name }}
      RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', needs.bump_and_tag.outputs.tag) || github.ref }}
      REPO_BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/apt
    steps:
      - name: Check out release tag
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_REF }}

      - name: Install packaging tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y apt-utils dpkg-dev gnupg

      - name: Download .deb artifacts
        uses: actions/download-artifact@v8
        with:
          name: deb-packages
          path: dist/deb

      - name: Import apt signing key
        env:
          APT_REPO_GPG_PRIVATE_KEY_B64: ${{ secrets.APT_REPO_GPG_PRIVATE_KEY_B64 }}
        run: |
          if [[ -z "$APT_REPO_GPG_PRIVATE_KEY_B64" ]]; then
            echo "APT_REPO_GPG_PRIVATE_KEY_B64 secret is required" >&2
            exit 1
          fi
          export GNUPGHOME="$(mktemp -d)"
          chmod 700 "$GNUPGHOME"
          printf '%s' "$APT_REPO_GPG_PRIVATE_KEY_B64" | base64 -d > /tmp/apt-signing.key
          gpg --batch --import /tmp/apt-signing.key
          echo "GNUPGHOME=$GNUPGHOME" >> "$GITHUB_ENV"

      - name: Restore existing apt pool from gh-pages
        run: |
          if git ls-remote --exit-code origin refs/heads/gh-pages >/dev/null 2>&1; then
            git fetch origin gh-pages
            if git ls-tree origin/gh-pages -- apt/pool/main/ | grep -q .; then
              mkdir -p dist/gh-pages/apt/pool/main
              git archive origin/gh-pages -- apt/pool/main/ | tar -x -C dist/gh-pages/
            fi
          fi

      - name: Build apt repository
        env:
          GPG_PASSPHRASE: ${{ secrets.APT_REPO_GPG_PASSPHRASE }}
          REPO_DIR: ${{ github.workspace }}/dist/gh-pages/apt
          PACKAGES_DIR: ${{ github.workspace }}/dist/deb
          ARCHES: amd64 arm64
        run: |
          ./scripts/build-apt-repo.sh
          cp scripts/install.sh dist/gh-pages/install.sh

      - name: Publish apt repository to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dist/gh-pages
          force_orphan: false

  smoke_apt_ec2:
    name: Smoke apt install on EC2
    runs-on: ubuntu-latest
    needs:
      - bump_and_tag
      - verify_release
      - publish_apt_repository
    if: >-
      always() &&
      needs.verify_release.result == 'success' &&
      needs.publish_apt_repository.result == 'success'
    permissions:
      id-token: write
      contents: read
    env:
      REPO_BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/apt
      AWS_SMOKE_ROLE_ARN: ${{ secrets.AWS_SMOKE_ROLE_ARN }}
    steps:
      - name: Check out release tag
        if: env.AWS_SMOKE_ROLE_ARN != ''
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', needs.bump_and_tag.outputs.tag) || github.ref }}

      - name: Set up Go
        if: env.AWS_SMOKE_ROLE_ARN != ''
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Configure AWS credentials
        if: env.AWS_SMOKE_ROLE_ARN != ''
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_SMOKE_ROLE_ARN }}
          aws-region: ${{ secrets.SMOKE_AWS_REGION }}

      - name: Wait for apt repository publication
        if: env.AWS_SMOKE_ROLE_ARN != ''
        run: |
          for _ in $(seq 1 30); do
            if curl -fsSL "$REPO_BASE_URL/dists/noble/InRelease" >/dev/null; then
              exit 0
            fi
            sleep 10
          done
          echo "Timed out waiting for apt repository publication" >&2
          exit 1

      - name: Run EC2 smoke test
        if: env.AWS_SMOKE_ROLE_ARN != ''
        env:
          SMOKE_AWS_REGION: ${{ secrets.SMOKE_AWS_REGION }}
          SMOKE_APT_SUITE: noble
          SMOKE_REPO_BASE_URL: ${{ env.REPO_BASE_URL }}
        run: ./scripts/smoke-ec2.sh

  publish_release:
    name: Publish release
    runs-on: ubuntu-latest
    needs:
      - bump_and_tag
      - verify_release
      - publish_container
      - smoke_container
      - build_apt_packages
      - smoke_deb_artifacts
      - publish_apt_repository
      - smoke_apt_ec2
    if: >-
      always() &&
      needs.verify_release.result == 'success' &&
      needs.publish_container.result == 'success' &&
      needs.smoke_container.result == 'success' &&
      needs.build_apt_packages.result == 'success' &&
      needs.smoke_deb_artifacts.result == 'success' &&
      needs.publish_apt_repository.result == 'success' &&
      (needs.smoke_apt_ec2.result == 'success' || needs.smoke_apt_ec2.result == 'skipped')
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && needs.bump_and_tag.outputs.tag || github.ref_name }}
      RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', needs.bump_and_tag.outputs.tag) || github.ref }}
      REPO_BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/apt
    steps:
      - name: Check out release tag
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_REF }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Verify SDK package still builds
        run: go build ./pkg/bridgeclient

      - name: Download .deb artifacts
        uses: actions/download-artifact@v8
        with:
          name: deb-packages
          path: dist/deb

      - name: Create GitHub release for Go SDK tag
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: dist/deb/*.deb
          body: |
            ## Published artifacts

            - Go SDK module tag: `${{ env.RELEASE_TAG }}`
            - Docker image: `ghcr.io/${{ github.repository }}:${{ env.RELEASE_TAG }}`
            - Docker image digest: `${{ needs.publish_container.outputs.digest }}`
            - Apt repository: `${{ env.REPO_BASE_URL }}`
            - Install helper: `https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/install.sh`
