repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict

  - repo: local
    hooks:
      - id: gofmt
        name: gofmt
        entry: gofmt -w
        language: system
        types: [go]

      - id: goimports
        name: goimports
        entry: goimports -w
        language: system
        types: [go]

      - id: golangci-lint
        name: golangci-lint
        entry: ./scripts/lint-go.sh
        language: system
        pass_filenames: false

      - id: pre-push-checks
        name: pre-push checks
        entry: ./scripts/pre-push-checks.sh
        language: system
        pass_filenames: false
        stages: [pre-push]
