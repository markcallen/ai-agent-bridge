server:
  listen: "0.0.0.0:9445"

tls:
  ca_bundle: "/app/certs/ca-bundle.crt"
  cert: "/app/certs/bridge.crt"
  key: "/app/certs/bridge.key"

auth:
  jwt_public_keys:
    - issuer: "e2e"
      key_path: "/app/certs/jwt-signing.pub"
  jwt_audience: "bridge"
  jwt_max_ttl: "5m"

sessions:
  max_per_project: 20
  max_global: 20
  idle_timeout: "30m"
  stop_grace_period: "10s"
  event_buffer_size: 8388608

input:
  max_size_bytes: 65536

rate_limits:
  global_rps: 200
  global_burst: 400
  start_session_per_client_rps: 10
  start_session_per_client_burst: 20
  send_input_per_session_rps: 20
  send_input_per_session_burst: 50

providers:
  claude:
    binary: "./node_modules/.bin/claude"
    args: ["--verbose"]
    startup_timeout: "120s"
    startup_probe: "prompt"
    required_env: ["ANTHROPIC_API_KEY"]
    prompt_pattern: "(?m)(❯|>\\s*$)"
  opencode:
    binary: "./node_modules/.bin/opencode"
    args: []
    startup_timeout: "30s"
    startup_probe: "output"
    required_env: ["OPENAI_API_KEY"]
    prompt_pattern: "❯"
  codex:
    binary: "./node_modules/.bin/codex"
    args: []
    startup_timeout: "60s"
    startup_probe: "output"
    required_env: ["OPENAI_API_KEY"]
    prompt_pattern: "(?m)(>\\s*$|›)"
  gemini:
    binary: "./node_modules/.bin/gemini"
    args: ["-m", "gemini-2.5-flash"]
    startup_timeout: "60s"
    startup_probe: "output"
    required_env: ["GEMINI_API_KEY"]
    prompt_pattern: ">"
  echo:
    binary: "cat"
    args: []
    startup_timeout: "5s"

allowed_paths:
  - "/tmp"

logging:
  level: "info"
  format: "json"
  redact_patterns:
    - "(?i)(api[_-]?key|token|secret|password)\\s*[:=]\\s*\\S+"
