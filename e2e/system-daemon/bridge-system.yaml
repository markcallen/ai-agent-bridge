server:
  listen: "0.0.0.0:9445"

# No TLS - dev mode for e2e testing
tls:
  ca_bundle: ""
  cert: ""
  key: ""

auth:
  jwt_public_keys: []
  jwt_audience: "bridge"
  jwt_max_ttl: "5m"

sessions:
  max_per_project: 5
  max_global: 10
  idle_timeout: "5m"
  stop_grace_period: "5s"
  event_buffer_size: 1048576

input:
  max_size_bytes: 65536

rate_limits:
  global_rps: 50
  global_burst: 100
  start_session_per_client_rps: 5
  start_session_per_client_burst: 10
  send_input_per_session_rps: 20
  send_input_per_session_burst: 50

providers:
  echo:
    binary: "cat"
    startup_timeout: "5s"
    startup_probe: "none"
    validate_startup: false

allowed_paths:
  - "/tmp"

logging:
  level: "info"
  format: "json"
